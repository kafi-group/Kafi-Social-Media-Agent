# Railway deployment — backend API (FastAPI)
# Dashboard: New Project → Deploy from GitHub → this repo
# Railway reads this file automatically; no extra service config needed.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.backend"

[deploy]
# Port binding is handled by Dockerfile.backend CMD (shell form expands $PORT).
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
